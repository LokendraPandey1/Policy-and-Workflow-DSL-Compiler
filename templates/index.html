<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSL Compiler</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-dark: #0f1115;
            --bg-panel: rgba(25, 28, 36, 0.7);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #60a5fa;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1.25rem 2rem;
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .compile-btn {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .compile-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .compile-btn:active {
            transform: translateY(0);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1.5rem;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .panel:focus-within {
            border-color: var(--border-highlight);
        }

        .panel-header {
            padding: 0.75rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.python {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            background-color: transparent;
            color: var(--text-main);
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            box-sizing: border-box;
            tab-size: 4;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <header>
        <h1>DSL to Python Compiler</h1>
        <button class="compile-btn" onclick="compileDSL()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Compile Code
        </button>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span>Input Source</span>
                <span class="badge">DSL</span>
            </div>
            <textarea id="source-input" spellcheck="false"
                placeholder="Enter your Policy & Workflow DSL code here..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>Compilation Output</span>
                <span class="badge python">Python</span>
            </div>
            <textarea id="python-output" readonly spellcheck="false"
                placeholder="Compiled Python code will appear here..."></textarea>
        </div>
    </div>

    <script>
        async function fetchExample() {
            try {
                const res = await fetch('/example');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('source-input').value = data.source;
                }
            } catch (e) {
                console.error("Could not fetch example", e);
            }
        }

        async function compileDSL() {
            const btn = document.querySelector('.compile-btn');
            const originalText = btn.innerHTML;

            const source = document.getElementById('source-input').value;
            const outputArea = document.getElementById('python-output');

            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Compiling...`;
            btn.style.opacity = '0.7';
            outputArea.value = "Compiling...";

            try {
                const res = await fetch('/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: source })
                });
                const data = await res.json();
                outputArea.value = data.python_code || "Unknown error occurred.";
            } catch (e) {
                outputArea.value = "# Server Connection Error\n" + e.message;
            } finally {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }
        }

        window.onload = fetchExample;

        // Handle tab key in textarea
        document.getElementById('source-input').addEventListener('keydown', function (e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;
                // set textarea value to: text before caret + tab + text after caret
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                // put caret at right position again
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });
    </script>
</body>

</html>
